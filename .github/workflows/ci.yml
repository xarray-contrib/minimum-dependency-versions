name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: tests
    runs-on: [ubuntu-latest]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: clone the repository
        uses: actions/checkout@v6
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: upgrade pip
        run: |
          python -m pip install --upgrade pip
      - name: install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install .
          python -m pip install pytest
      - name: run tests
        run: |
          python -m pytest -rf

  e2e:
    name: end-to-end
    runs-on: [ubuntu-latest]

    strategy:
      fail-fast: false
      matrix:
        envs:
          - "envs/env1.yaml"
          - "envs/env2.yaml"
          - |
            envs/env1.yaml
            envs/env2.yaml
        expected-failure: ["false"]
        policy-file: ["policy.yaml"]
        include:
          - envs: |
              envs/failing-env1.yaml
            policy-file: "policy.yaml"
            expected-failure: "true"
          - envs: |
              envs/env1.yaml
              envs/failing-env1.yaml
            policy-file: "policy.yaml"
            expected-failure: "true"
          - envs: "envs/env1.yaml"
            policy-file: "policy_no_extra_options.yaml"
            expected-failure: "false"
          - envs: "pixi:env1"
            manifest-path: "envs/pixi.toml"
            policy-file: "policy.yaml"
            expected-failure: "false"
          - envs: |
              pixi:env1
              pixi:env2
            manifest-path: "envs/pixi.toml"
            policy-file: "policy.yaml"
            expected-failure: "false"
          - envs: |
              pixi:env1
              conda:envs/env2.yaml
            manifest-path: "envs/pixi.toml"
            policy-file: "policy.yaml"
            expected-failure: "false"
          - envs: "pixi:failing-env"
            manifest-path: "envs/pixi.toml"
            policy-file: "policy.yaml"
            expected-failure: "true"

    steps:
      - name: clone the repository
        uses: actions/checkout@v6
      - name: run action
        uses: ./
        id: action-run
        continue-on-error: true
        with:
          policy: ${{ matrix.policy-file }}
          environments: ${{ matrix.envs }}
          today: 2024-12-20
          manifest-path: ${{ matrix.manifest-path }}
      - name: detect outcome
        if: always()
        shell: bash -l {0}
        run: |
          if [[ "${{ steps.action-run.outcome }}" == "success" && ${{ matrix.expected-failure }} == "true" ]]; then
              # unexpected pass
              echo "workflow xpassed"
              export STATUS=1
          elif [[ "${{ steps.action-run.outcome }}" == "failure" && ${{ matrix.expected-failure }} == "false" ]]; then
              # unexpected failure
              echo "workflow failed"
              export STATUS=2
          elif [[ "${{ steps.action-run.outcome }}" == "success" && ${{ matrix.expected-failure }} == "false" ]]; then
              # normal pass
              echo "workflow passed"
              export STATUS=0
          elif [[ "${{ steps.action-run.outcome }}" == "failure" && ${{ matrix.expected-failure }} == "true" ]]; then
              # expected failure
              echo "workflow xfailed"
              export STATUS=0
          else
              # cancelled
              echo "workflow cancelled"
              export STATUS=3
          fi
          exit $STATUS
